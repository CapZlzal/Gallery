<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Hazem Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ LOGIN OVERLAY ════════════════════════════════════ -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">H</div>
      </div>
      <h1 class="login-title" data-i18n="loginTitle">لوحة الأدمن</h1>
      <p class="login-sub" data-i18n="loginSub">أدخل بيانات الدخول للمتابعة</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="inp-username" data-i18n="userLbl">اسم المستخدم</label>
          <input class="form-input" id="inp-username" type="text"
            placeholder="username" autocomplete="username" autocapitalize="none" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="inp-password" data-i18n="passLbl">كلمة المرور</label>
          <input class="form-input" id="inp-password" type="password"
            placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <p class="login-error" id="login-error" aria-live="polite"></p>
        <button type="submit" class="btn btn-accent btn-login-submit" id="btn-login">
          <span class="btn-text" data-i18n="loginBtn">دخول</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:.8rem;color:var(--text-m)">
        <a href="index.html" data-i18n="backGallery">← المعرض</a>
      </p>
    </div>
  </div>

  <!-- ═══ ADMIN DASHBOARD ══════════════════════════════════ -->
  <div class="admin-dashboard" id="admin-dashboard">

    <!-- Header -->
    <header class="site-header">
      <div class="container header-inner">
        <div class="logo">
          <span class="logo-mark">H</span>
          <span data-i18n="siteTitle">Hazem Gallery</span>
        </div>
        <div class="header-controls">
          <button class="icon-btn" id="btn-lang" title="Switch language">ع</button>
          <button class="icon-btn" id="btn-theme" title="Toggle theme">☀️</button>
          <a href="index.html" class="btn btn-ghost btn-sm" data-i18n="backGallery">← المعرض</a>
          <button id="btn-logout" class="btn btn-ghost btn-sm" data-i18n="logout">خروج</button>
        </div>
      </div>
    </header>

    <!-- Stats strip -->
    <div class="container">
      <div class="stats-strip">
        <div class="stat-card">
          <div class="stat-icon purple">🖼</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label" data-i18n="totalImages">إجمالي الصور</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">🎞</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-collections">0</div>
            <div class="stat-label" data-i18n="totalCol">المجموعات</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">🏷</div>
          <div class="stat-info">
            <div class="stat-value" id="stat-cats">0</div>
            <div class="stat-label" data-i18n="totalCat">الفئات</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Upload section -->
    <section class="upload-section">
      <div class="container">
        <div class="upload-layout">

          <!-- Drop zone -->
          <div class="upload-drop" id="drop-zone">
            <div class="drop-icon" aria-hidden="true">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <h2 class="upload-title" data-i18n="uploadTitle">ارفع صورة جديدة</h2>
            <p class="upload-subtitle" data-i18n="uploadSub">صورة واحدة أو مجموعة → slider</p>

            <!-- Preview strip -->
            <div class="preview-strip" id="preview-strip" role="list"></div>

            <input type="file" id="file-input" accept="image/*" multiple hidden />
          </div>

          <!-- Form panel -->
          <div class="upload-form-panel">
            <div class="upload-form-title" data-i18n="formTitle">تفاصيل الصورة</div>

            <div class="form-group">
              <label class="form-label" for="inp-img-name" data-i18n="nameLabel">الاسم / عنوان المشروع</label>
              <input class="form-input" id="inp-img-name" type="text"
                data-i18n="namePH" data-i18n-attr="placeholder"
                placeholder="مثال: شعار شركة ABC" maxlength="80" />
            </div>

            <div class="form-group">
              <label class="form-label" for="inp-category" data-i18n="catLabel">الفئة</label>
              <select class="form-select" id="inp-category">
                <option value="logo">Logo — شعار</option>
                <option value="photo" selected>Photo — صورة عادية</option>
                <option value="other">Other — أخرى</option>
              </select>
            </div>

            <!-- Custom category (shown when "other" selected) -->
            <div id="custom-cat-wrap" style="display:none" class="form-group">
              <label class="form-label" for="inp-custom-cat" data-i18n="customCatLbl">اسم الفئة المخصصة</label>
              <input class="form-input" id="inp-custom-cat" type="text"
                data-i18n="customCatPH" data-i18n-attr="placeholder"
                placeholder="مثال: موشن جرافيك" maxlength="40" />
            </div>

            <!-- Upload controls -->
            <div class="upload-controls">
              <button class="btn btn-primary" id="btn-select">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span data-i18n="selectFiles">اختيار الصور</span>
              </button>
              <button class="btn btn-accent" id="btn-upload" disabled>
                <span class="btn-text">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M5 20h14"/>
                  </svg>
                  <span data-i18n="upload">رفع</span>
                </span>
                <span class="btn-spinner" aria-hidden="true"></span>
              </button>
            </div>

            <!-- Status + progress -->
            <p class="upload-status" id="upload-status" role="status" aria-live="polite"></p>
            <div class="progress-bar-wrap" id="progress-wrap" hidden>
              <div class="progress-bar" id="progress-bar"></div>
            </div>
          </div>

        </div><!-- /upload-layout -->
      </div>
    </section>

    <!-- Gallery section -->
    <section class="gallery-section">
      <div class="container">

        <div class="gallery-header">
          <h2 class="gallery-title" data-i18n="uploadedGallery">
            الصور المرفوعة
            <span class="gallery-count" id="gallery-count">0</span>
          </h2>
          <div class="gallery-actions">
            <button class="btn btn-danger btn-sm" id="btn-clear-all" data-i18n="clearAll" hidden>مسح الكل</button>
          </div>
        </div>

        <div class="filter-bar" id="filter-bar" data-admin="1"></div>

        <div class="empty-state" id="empty-state">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p data-i18n="emptyAdmin">ارفع صورتك الأولى من الأعلى</p>
        </div>

        <div class="gallery-grid" id="gallery-grid" role="list"></div>

      </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" hidden>
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
      <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Previous" hidden>&#8249;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="Full view" />
      <button class="lb-arrow lb-next" id="lb-next" aria-label="Next" hidden>&#8250;</button>
      <span class="lb-counter" id="lb-counter" hidden></span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container">
        <p>Hazem Gallery — Admin Panel</p>
      </div>
    </footer>

  </div><!-- /admin-dashboard -->

  <script src="app.js"></script>
  <script src="admin.js"></script>
</body>
</html>
