<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Hazem Gallery — معرض أعمال احترافي" />
  <title>Hazem Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <span class="logo-mark">H</span>
        <span data-i18n="siteTitle">Hazem Gallery</span>
      </div>
      <div class="header-controls">
        <button class="icon-btn" id="btn-lang" title="Switch language" aria-label="Switch language">ع</button>
        <button class="icon-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">☀️</button>
      </div>
    </div>
  </header>

  <!-- ═══ GALLERY ══════════════════════════════════════════ -->
  <main class="gallery-section">
    <div class="container">

      <div class="gallery-header">
        <h1 class="gallery-title" data-i18n="galleryTitle">
          أعمالنا
          <span class="gallery-count" id="gallery-count">0</span>
        </h1>
      </div>

      <div class="filter-bar" id="filter-bar" data-admin="0"></div>

      <div class="empty-state" id="empty-state">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        <p data-i18n="emptyMain">لا توجد صور بعد.<br>ادخل كأدمن لرفع الصور.</p>
      </div>

      <div class="gallery-grid" id="gallery-grid" role="list" aria-label="gallery"></div>

    </div>
  </main>

  <!-- ═══ LIGHTBOX ══════════════════════════════════════════ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Previous" hidden>&#8249;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="Full view" />
    <button class="lb-arrow lb-next" id="lb-next" aria-label="Next" hidden>&#8250;</button>
    <span class="lb-counter" id="lb-counter" hidden></span>
  </div>

  <!-- ═══ TOAST ═════════════════════════════════════════════ -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- ═══ FOOTER ════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="container">
      <p>تصميم وبرمجة <small style="color:var(--text)">Sayed Mamdouh Eldeeb</small></p>
      <p style="margin-top:10px">
        <a href="admin.html" style="color:var(--text-m);font-size:.75rem;opacity:.4;transition:opacity .2s"
          onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='.4'">admin</a>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderGallery({ isAdmin: false, showFilter: true });
    });
  </script>
</body>

</html>
